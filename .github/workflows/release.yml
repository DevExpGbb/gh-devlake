name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
          go_build_options: >-
            -ldflags=-X=github.com/DevExpGBB/gh-devlake/cmd.version=${{ github.ref_name }}
